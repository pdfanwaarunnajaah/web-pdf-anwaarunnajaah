<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeri - PDF Anwaarunnajaah</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: #f8fffd;
      }

      .gallery-card {
        overflow: hidden;
        border-radius: 15px;
        transition: 0.3s;
        background: white;
      }

      .gallery-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        transition: 0.3s;
      }

      .gallery-card:hover img {
        transform: scale(1.1);
      }

      .gallery-desc {
        padding: 10px;
        font-size: 14px;
      }
      /* variasi tombol kembali */
      .btn-custom {
        background: #00bfa6;
        color: white;
        border-radius: 30px;
        padding: 10px 25px;
        transition: 0.3s;
      }

      .btn-custom:hover {
        background: #008f7a;
      }
      .btn-custom:hover {
        background: #008f7a;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>

  <body>
    <div class="container py-5 text-center">
      <h2>Galeri Kegiatan Santri</h2>
      <p class="mb-4">Dokumentasi kegiatan PDF Anwaarunnajaah</p>

      <div class="row">
        <div class="col-md-4 mb-4">
          <div class="gallery-card">
            <img src="assets/img/foto1.jpeg" />
            <div class="gallery-desc">Kegiatan ngaji rutin santri</div>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div class="gallery-card">
            <img src="assets/img/foto2.jpeg" />
            <div class="gallery-desc">Kajian kitab kuning</div>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div class="gallery-card">
            <img src="assets/img/foto3.jpeg" />
            <div class="gallery-desc">Kegiatan hafalan Al-Qur'an</div>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div class="gallery-card">
            <img src="assets/img/foto4.jpeg" />
            <div class="gallery-desc">Kegiatan santri di kelas</div>
          </div>
        </div>
      </div>

      <a href="index.html" class="btn btn-custom mt-4">
        ← Kembali ke Beranda
      </a>
    </div>
  </body>
</html>
